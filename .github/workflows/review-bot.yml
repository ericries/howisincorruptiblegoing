name: Review Bot

on:
  pull_request:
    paths:
      - 'content/entries/**'

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install requests

      - name: Schema validation & injection detection
        run: python scripts/review_bot/validate_entries.py

      - name: Check for duplicate entries
        run: |
          CHANGED=$(git diff --name-only origin/main...HEAD -- 'content/entries/*.json' || echo "")
          if [ -n "$CHANGED" ]; then
            python scripts/review_bot/check_duplicates.py $CHANGED
          else
            echo "No entry files changed."
          fi

      - name: Quote verification
        run: |
          CHANGED=$(git diff --name-only origin/main...HEAD -- 'content/entries/*.json' || echo "")
          if [ -n "$CHANGED" ]; then
            python scripts/review_bot/verify_quotes.py $CHANGED
          else
            echo "No entry files changed."
          fi

      - name: Image validation
        run: |
          CHANGED=$(git diff --name-only origin/main...HEAD -- 'content/entries/*.json' || echo "")
          if [ -n "$CHANGED" ]; then
            python scripts/review_bot/check_images.py $CHANGED
          else
            echo "No entry files changed."
          fi
